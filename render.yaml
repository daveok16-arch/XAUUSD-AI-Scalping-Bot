services:
  - type: web
    name: xauusd-scalping-bot
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --timeout 120 -b 0.0.0.0:$PORT src.api.app:app

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

      - key: MODEL_PATH
        value: /app/models/xauusd_best_model.joblib

    healthCheckPath: /health
    autoDeploy: true
